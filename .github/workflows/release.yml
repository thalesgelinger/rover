name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.0.1-alpha.1'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: rover
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: rover
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: rover
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: rover
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: rover.exe
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset=rover-$tag-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@cross

      - name: Build
        shell: bash
        env:
          ROVER_WEB_SKIP_AUTO_BUILD: 1
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build -p rover_cli --release --target ${{ matrix.target }}
          else
            cargo build -p rover_cli --release --target ${{ matrix.target }}
          fi

      - name: Smoke test binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          "$bin" --help

      - name: Stage files
        shell: bash
        run: |
          mkdir -p "dist/${{ steps.vars.outputs.asset }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ steps.vars.outputs.asset }}/"
          cp README.md "dist/${{ steps.vars.outputs.asset }}/README.md"

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "${{ steps.vars.outputs.asset }}.tar.gz" "${{ steps.vars.outputs.asset }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ steps.vars.outputs.asset }}" -DestinationPath "dist/${{ steps.vars.outputs.asset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.asset }}
          path: dist/${{ steps.vars.outputs.asset }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify archives
        shell: bash
        run: |
          mkdir -p verify
          for file in dist/*; do
            case "$file" in
              *.tar.gz) tar -tzf "$file" >/dev/null ;;
              *.zip) unzip -t "$file" >/dev/null ;;
            esac
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          First alpha release. Prebuilt `rover` CLI binaries for macOS, Linux, and Windows.

          ## Install

          Unix:

          ```sh
          curl -fsSL https://rover.lu/install | sh
          ```

          Windows:

          ```powershell
          irm https://rover.lu/install.ps1 | iex
          ```

          ## Included

          - CLI: `run`, `check`, `fmt`, `build`, `db`, `lsp`
          - Lua backend server with route functions, request context, response helpers, route patterns, config, lifecycle hooks
          - Static assets, HTML templates, HTTP client, WebSocket server/client APIs
          - Database module, migrations, DB query DSL
          - Cookie session auth, guard validation, permissions, idempotency, compression
          - IO/debug helpers, OpenAPI/raw server extras
          - Signals/reactive primitives, UI runtime foundation, TUI foundation
          - macOS/iOS runtime scaffolding, web runtime/build path
          - Early LSP server and `rover.lua` script shortcuts

          Docs: https://rover.lu/docs
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes-file release-notes.md --prerelease
            gh release upload "$tag" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes-file release-notes.md \
              --prerelease
          fi

  deploy-docs:
    name: Deploy rover.lu
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rover-docs/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.155.3'
          extended: true

      - name: Install dependencies
        working-directory: rover-docs
        run: npm ci

      - name: Deploy to rover.lu
        working-directory: rover-docs
        run: npx sst deploy --stage production --verbose --print-logs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
