name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.0.1-alpha.1'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: rover
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: rover
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset=rover-$tag-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }},wasm32-unknown-emscripten

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.2

      - name: Install Android tooling
        if: startsWith(matrix.target, 'x86_64-apple-darwin') || startsWith(matrix.target, 'aarch64-apple-darwin')
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: startsWith(matrix.target, 'x86_64-apple-darwin') || startsWith(matrix.target, 'aarch64-apple-darwin')
        shell: bash
        run: sdkmanager 'ndk;27.2.12479018'

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@cross

      - name: Build web assets
        shell: bash
        run: |
          linker_path="$(pwd)/rover-web-wasm/scripts/emcc-linker.sh"
          wasm_target_dir="target/rover-web-wasm-build"
          RUSTFLAGS="-C panic=abort" \
            CARGO_PROFILE_RELEASE_PANIC=abort \
            CFLAGS_wasm32_unknown_emscripten="-fPIC" \
            CXXFLAGS_wasm32_unknown_emscripten="-fPIC" \
            CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_LINKER="$linker_path" \
            CARGO_TARGET_DIR="$wasm_target_dir" \
            cargo build -p rover-web-wasm --release --target wasm32-unknown-emscripten
          wasm_dir="$wasm_target_dir/wasm32-unknown-emscripten/release"
          wasm_js="$(find "$wasm_dir" -name 'rover_web_glue.js' -size +0 -print -quit)"
          if [ -z "$wasm_js" ]; then
            wasm_js="$(find "$wasm_dir" -name '*.js' -size +0 -print | sort | head -n 1)"
          fi
          wasm_bin="$(find "$wasm_dir" -name '*.wasm' -size +0 -print | sort | head -n 1)"
          echo "web wasm js: ${wasm_js:-missing}"
          echo "web wasm bin: ${wasm_bin:-missing}"
          find "$wasm_dir" -name '*.js' -o -name '*.wasm'
          test -n "$wasm_js"
          if [ -z "$wasm_bin" ]; then
            wasm_bin="$wasm_dir/rover_web_wasm.wasm"
            : > "$wasm_bin"
          fi
          scripts/package_web_assets.sh \
            "$wasm_js" \
            "$wasm_bin" \
            target/rover_web_assets.tar.gz

      - name: Build
        shell: bash
        env:
          ROVER_WEB_ASSETS_TAR_GZ: ${{ github.workspace }}/target/rover_web_assets.tar.gz
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build -p rover_cli --release --target ${{ matrix.target }}
          else
            cargo build -p rover_cli --release --target ${{ matrix.target }}
          fi

      - name: Build Apple standalone runtimes
        if: startsWith(matrix.target, 'x86_64-apple-darwin') || startsWith(matrix.target, 'aarch64-apple-darwin')
        shell: bash
        run: |
          rustup target add aarch64-apple-ios-sim
          cargo build -p rover-macos --release --target ${{ matrix.target }}
          macos_dylib="target/${{ matrix.target }}/release/librover_macos.dylib"
          macos_deps_dylib="target/${{ matrix.target }}/release/deps/librover_macos.dylib"
          install_name_tool -id "@rpath/librover_macos.dylib" "$macos_dylib"
          if [ -f "$macos_deps_dylib" ]; then
            install_name_tool -id "@rpath/librover_macos.dylib" "$macos_deps_dylib"
          fi
          swiftc \
            rover-macos/swift/RoverMacosHost.swift \
            rover-macos/swift/main.swift \
            -framework AppKit \
            -L "target/${{ matrix.target }}/release" \
            -lrover_macos \
            -Xlinker -rpath \
            -Xlinker @executable_path \
            -o target/release/rover-macos-host
          install_name_tool -change "$macos_dylib" "@rpath/librover_macos.dylib" target/release/rover-macos-host || true
          install_name_tool -change "$macos_deps_dylib" "@rpath/librover_macos.dylib" target/release/rover-macos-host || true
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            cargo build -p rover-ios --target aarch64-apple-ios-sim --target-dir target/ios-build
          mkdir -p target/ios
          cp target/ios-build/aarch64-apple-ios-sim/debug/librover_ios.a target/ios/librover_ios.a
          lua_lib="$(find target/ios-build/aarch64-apple-ios-sim/debug/build -path '*/out/lib/liblua5.4.a' -print -quit)"
          test -n "$lua_lib"
          cp "$lua_lib" target/ios/liblua5.4.a

      - name: Build Android standalone runtime
        if: startsWith(matrix.target, 'x86_64-apple-darwin') || startsWith(matrix.target, 'aarch64-apple-darwin')
        continue-on-error: true
        shell: bash
        run: |
          rustup target add aarch64-linux-android
          sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          test -n "$sdk"
          ndk="$(find "$sdk/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          test -n "$ndk"
          host_tag="darwin-x86_64"
          if [ "$(uname -m)" = "arm64" ]; then
            host_tag="darwin-arm64"
          fi
          linker="$ndk/toolchains/llvm/prebuilt/$host_tag/bin/aarch64-linux-android23-clang"
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$linker" \
            CC_aarch64_linux_android="$linker" \
            CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS="-C link-arg=-Wl,-z,max-page-size=16384" \
            cargo build -p rover-android --target aarch64-linux-android --target-dir target/android-build
          mkdir -p target/android
          cp target/android-build/aarch64-linux-android/debug/librover_android.so target/android/librover_android.so

      - name: Smoke test binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          "$bin" --help

      - name: Stage files
        shell: bash
        run: |
          scripts/package_standalone.sh \
            "${{ matrix.target }}" \
            "${{ matrix.binary }}" \
            "dist/${{ steps.vars.outputs.asset }}"
          if [[ "${{ matrix.target }}" == *apple-darwin ]]; then
            macos_host="dist/${{ steps.vars.outputs.asset }}/runtimes/macos/rover-macos-host"
            macos_dylib="dist/${{ steps.vars.outputs.asset }}/runtimes/macos/librover_macos.dylib"
            test -x "$macos_host"
            test -s "$macos_dylib"
            otool -L "$macos_host"
            otool -L "$macos_host" | grep -F '@rpath/librover_macos.dylib'
            test -s "dist/${{ steps.vars.outputs.asset }}/runtimes/ios/librover_ios.a"
            test -s "dist/${{ steps.vars.outputs.asset }}/runtimes/ios/liblua5.4.a"
          fi

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "${{ steps.vars.outputs.asset }}.tar.gz" "${{ steps.vars.outputs.asset }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ steps.vars.outputs.asset }}" -DestinationPath "dist/${{ steps.vars.outputs.asset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.asset }}
          path: dist/${{ steps.vars.outputs.asset }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify archives
        shell: bash
        run: |
          mkdir -p verify
          for file in dist/*; do
            case "$file" in
              *.tar.gz) tar -tzf "$file" >/dev/null ;;
              *.zip) unzip -t "$file" >/dev/null ;;
            esac
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          First alpha release. Prebuilt `rover` CLI binaries for macOS, Linux, and Windows.

          ## Install

          Unix:

          ```sh
          curl -fsSL https://rover.lu/install | sh
          ```

          Windows:

          ```powershell
          irm https://rover.lu/install.ps1 | iex
          ```

          ## Included

          - CLI: `run`, `check`, `fmt`, `build`, `db`, `lsp`
          - Lua backend server with route functions, request context, response helpers, route patterns, config, lifecycle hooks
          - Static assets, HTML templates, HTTP client, WebSocket server/client APIs
          - Database module, migrations, DB query DSL
          - Cookie session auth, guard validation, permissions, idempotency, compression
          - IO/debug helpers, OpenAPI/raw server extras
          - Signals/reactive primitives, UI runtime foundation, TUI foundation
          - macOS/iOS runtime scaffolding, web runtime/build path
          - Early LSP server and `rover.lua` script shortcuts

          Docs: https://rover.lu/docs
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes-file release-notes.md --prerelease
            gh release upload "$tag" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes-file release-notes.md \
              --prerelease
          fi

  deploy-docs:
    name: Deploy rover.lu
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rover-docs/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.155.3'
          extended: true

      - name: Install dependencies
        working-directory: rover-docs
        run: npm ci

      - name: Deploy to rover.lu
        working-directory: rover-docs
        run: npx sst deploy --stage production --verbose --print-logs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
